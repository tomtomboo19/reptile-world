<style>
.post-form{background:var(--surface);border:1px solid var(--border);padding:1.8rem;margin-bottom:2rem;}
.post-form-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--accent2);margin-bottom:1rem;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-bottom:.8rem;}
.form-input{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:.85rem;padding:.65rem 1rem;width:100%;outline:none;transition:border-color .2s;}
.form-input:focus{border-color:var(--border2);}
.form-select{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'Space Mono',monospace;font-size:.72rem;padding:.65rem 1rem;width:100%;outline:none;}
.form-textarea{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:.85rem;padding:.65rem 1rem;width:100%;min-height:90px;resize:vertical;outline:none;transition:border-color .2s;}
.form-textarea:focus{border-color:var(--border2);}
.img-upload-label{display:inline-block;cursor:pointer;font-family:'Space Mono',monospace;font-size:.7rem;padding:.5rem 1rem;border:1px dashed var(--border2);color:var(--text3);transition:all .2s;margin-top:.5rem;}
.img-upload-label:hover{border-color:var(--accent);color:var(--accent);}
.img-preview{max-width:100%;max-height:160px;object-fit:contain;margin-top:.6rem;display:none;border:1px solid var(--border);}
.form-submit{font-family:'Space Mono',monospace;font-size:.75rem;letter-spacing:.08em;padding:.7rem 1.8rem;background:var(--accent);color:#0a1a0a;border:none;cursor:pointer;font-weight:700;transition:all .2s;margin-top:.6rem;}
.form-submit:hover{background:var(--accent2);}
.posts-list{display:flex;flex-direction:column;gap:.8rem;}
.post-card{background:var(--surface);border:1px solid var(--border);padding:1.2rem 1.4rem;}
.post-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem;gap:.5rem;flex-wrap:wrap;}
.post-author{font-family:'Space Mono',monospace;font-size:.72rem;color:var(--accent2);font-weight:700;}
.post-tag{font-family:'Space Mono',monospace;font-size:.55rem;letter-spacing:.08em;padding:.15rem .45rem;background:rgba(76,175,80,.1);color:var(--accent3);border:1px solid var(--border);}
.post-time{font-family:'Space Mono',monospace;font-size:.6rem;color:var(--text3);}
.post-body{font-size:.86rem;color:var(--text2);font-weight:300;line-height:1.7;}
.post-img{max-width:100%;max-height:240px;object-fit:contain;margin-top:.7rem;border:1px solid var(--border);display:block;}
.admin-bar{display:none;background:rgba(229,115,115,.08);border:1px solid rgba(229,115,115,.2);border-radius:2px;padding:.35rem .8rem;margin-bottom:.6rem;font-family:'Space Mono',monospace;font-size:.6rem;color:#e57373;align-items:center;justify-content:space-between;}
.delete-btn{font-family:'Space Mono',monospace;font-size:.6rem;padding:.2rem .6rem;background:none;border:1px solid #e57373;color:#e57373;cursor:pointer;transition:all .2s;}
.delete-btn:hover{background:#e57373;color:#fff;}
.posts-empty{font-family:'Space Mono',monospace;font-size:.75rem;color:var(--text3);text-align:center;padding:2.5rem;border:1px dashed var(--border);}
@media(max-width:600px){.form-row{grid-template-columns:1fr;}}
</style>
</head>

</nav>
<div class="nav-drawer" id="navDrawer">
  <a href="index.html" onclick="closeDrawer()">TOP</a>
  <a href="species.html" onclick="closeDrawer()">図鑑</a>
  <a href="care.html" onclick="closeDrawer()">飼育・繁殖</a>
  <a href="info.html" onclick="closeDrawer()">情報・ショップ</a>

<div class="page-hero">
  <div class="page-hero-label">// COMMUNITY</div>
  <h1 class="page-hero-title">コミュニ<span>ティ</span></h1>
  <p class="page-hero-desc">飼育の悩み・自慢の子の紹介・情報交換など気軽に投稿してください。</p>
</div>

<div class="section fade-in">
  <div class="post-form">
    <div class="post-form-title">投稿する</div>
    <div class="form-row">
      <input class="form-input" id="postName" placeholder="ニックネーム（任意）" maxlength="30">
      <select class="form-select" id="postTag">
        <option value="質問">質問</option>
        <option value="飼育報告">飼育報告</option>
        <option value="繁殖">繁殖</option>
        <option value="自慢の子">自慢の子</option>
        <option value="用品レビュー">用品レビュー</option>
        <option value="イベント">イベント</option>
        <option value="雑談">雑談</option>
      </select>
    </div>
    <textarea class="form-textarea" id="postBody" placeholder="内容を書いてください（500文字以内）" maxlength="500"></textarea>
    <div>
      <label class="img-upload-label">
        📷 画像を追加（任意・3MB以下）
        <input type="file" id="postImg" accept="image/*" style="display:none" onchange="previewImg(this)">
      </label>
      <img id="imgPreview" class="img-preview">

    <div><button class="form-submit" onclick="submitPost()">投稿する →</button></div>

</div>

<script>
function toggleDrawer(){document.getElementById('hamburger').classList.toggle('open');document.getElementById('navDrawer').classList.toggle('open');document.body.style.overflow=document.getElementById('navDrawer').classList.contains('open')?'hidden':'';}
function closeDrawer(){document.getElementById('hamburger').classList.remove('open');document.getElementById('navDrawer').classList.remove('open');document.body.style.overflow='';}

/* ===== 掲示板 ===== */
const KEY = 'rw_posts_v2';
let adminMode = false;

function loadPosts(){
  try{return JSON.parse(localStorage.getItem(KEY)||'[]');}catch(e){return[];}
}
function savePosts(p){
  try{localStorage.setItem(KEY,JSON.stringify(p.slice(0,100)));}
  catch(e){alert('保存失敗（ストレージ不足の可能性があります）');}
}
function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderPosts(){
  const posts = loadPosts();
  const c = document.getElementById('postsList');
  if(!posts.length){
    c.innerHTML = '<div class="posts-empty">まだ投稿がありません。最初の投稿をしてみましょう！</div>';
    return;
  }
  c.innerHTML = '';
  posts.forEach(function(p, i){
    const card = document.createElement('div');
    card.className = 'post-card';
    // 管理バー（デフォルト非表示）
    const bar = document.createElement('div');
    bar.className = 'admin-bar';
    bar.style.display = 'none';
    bar.innerHTML = '🔑 管理者モード <button class="delete-btn" onclick="deletePost(' + i + ')">✕ 削除</button>';
    card.appendChild(bar);
    // 投稿本文
    card.innerHTML += '<div class="post-header"><div><span class="post-author">' + esc(p.name||'匿名') + '</span><span class="post-tag" style="margin-left:.5rem;">' + esc(p.tag) + '</span></div><span class="post-time">' + esc(p.time) + '</span></div><div class="post-body">' + esc(p.body) + '</div>' + (p.img ? '<img class="post-img" src="' + p.img + '" alt="投稿画像" loading="lazy">' : '');
    c.appendChild(card);
  });
  // 管理モードなら管理バーを表示
  if(adminMode) showAdminBars();
}

function showAdminBars(){
  document.querySelectorAll('.admin-bar').forEach(function(b){b.style.display='flex';});
}
function hideAdminBars(){
  document.querySelectorAll('.admin-bar').forEach(function(b){b.style.display='none';});
}

function deletePost(i){
  if(!confirm('この投稿を削除しますか？'))return;
  const posts = loadPosts();
  posts.splice(i, 1);
  savePosts(posts);
  renderPosts();
}

function previewImg(input){
  const preview = document.getElementById('imgPreview');
  if(!input.files||!input.files[0]){preview.style.display='none';return;}
  const file = input.files[0];
  if(file.size > 3*1024*1024){alert('画像は3MB以下にしてください');input.value='';preview.style.display='none';return;}
  const reader = new FileReader();
  reader.onload = function(e){preview.src=e.target.result;preview.style.display='block';};
  reader.readAsDataURL(file);
}

function submitPost(){
  const name = document.getElementById('postName').value.trim();
  const tag = document.getElementById('postTag').value;
  const body = document.getElementById('postBody').value.trim();
  if(!body){alert('内容を入力してください');return;}
  const preview = document.getElementById('imgPreview');
  const img = (preview.style.display !== 'none' && preview.src) ? preview.src : null;
  const now = new Date();
  const time = now.getFullYear() + '/' + String(now.getMonth()+1).padStart(2,'0') + '/' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  const posts = loadPosts();
  posts.unshift({name:name||'匿名', tag:tag, body:body, time:time, img:img});
  savePosts(posts);
  document.getElementById('postName').value = '';
  document.getElementById('postBody').value = '';
  document.getElementById('postImg').value = '';
  preview.src = ''; preview.style.display = 'none';
  renderPosts();
}

/* ===== 管理者モード: Ctrl+Shift+A で起動（他ユーザーには非表示）===== */
const ADMIN_PASS = 'reptileworld2026';
function toggleAdmin(){
  if(adminMode){
    adminMode = false;
    hideAdminBars();
  } else {
    const p = prompt('管理者パスワードを入力してください');
    if(p === ADMIN_PASS){
      adminMode = true;
      showAdminBars();
      alert('管理者モードON。終了: Ctrl+Shift+A');
    } else if(p !== null){
      alert('パスワードが違います');
    }
  }
}
document.addEventListener('keydown', function(e){
  if(e.ctrlKey && e.shiftKey && e.key === 'A'){e.preventDefault(); toggleAdmin();}
});

renderPosts();

const obs = new IntersectionObserver(function(entries){entries.forEach(function(e,i){if(e.isIntersecting){setTimeout(function(){e.target.classList.add('visible');},i*50);obs.unobserve(e.target);}});},{threshold:0.07});
document.querySelectorAll('.fade-in').forEach(function(el){obs.observe(el);});
</script>
<script src="common.js"></script>
</body>
