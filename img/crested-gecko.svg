<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
  <rect width="480" height="320" fill="#0a1008"/>
  <!-- Branch -->
  <rect x="80" y="210" width="320" height="22" rx="11" fill="#2a1c0a"/>
  <rect x="80" y="210" width="320" height="10" rx="5" fill="#3a2810"/>
  <!-- Body on branch -->
  <ellipse cx="235" cy="198" rx="72" ry="38" fill="#4a6a20"/>
  <!-- Belly -->
  <ellipse cx="235" cy="208" rx="55" ry="26" fill="#7a9a40"/>
  <!-- Tail wrapped around branch -->
  <path d="M168 205 Q140 215 120 220 Q105 222 108 230 Q115 235 125 228 Q145 220 165 215Z" fill="#3a5818"/>
  <!-- Head -->
  <ellipse cx="318" cy="192" rx="50" ry="36" fill="#4a6a20"/>
  <!-- Crest along head -->
  <path d="M295 162 Q305 148 318 145 Q332 148 342 162" stroke="#6a9a30" stroke-width="4" fill="none"/>
  <!-- Crest spikes -->
  <path d="M298 162 L294 148 M306 157 L302 143 M315 154 L312 140 M325 156 L322 142 M334 160 L332 146" stroke="#6a9a30" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Eye - large, gecko-like -->
  <ellipse cx="332" cy="182" rx="16" ry="14" fill="#c8d880"/>
  <ellipse cx="332" cy="182" rx="5" ry="12" fill="#0a0a0a"/>
  <circle cx="329" cy="178" r="3" fill="rgba(255,255,255,0.5)"/>
  <!-- Snout -->
  <ellipse cx="362" cy="196" rx="20" ry="16" fill="#3a5818"/>
  <!-- Nostril -->
  <circle cx="358" cy="190" r="2.5" fill="#2a4010"/>
  <!-- Toe pads on branch -->
  <ellipse cx="258" cy="218" rx="18" ry="8" fill="#3a5818" opacity="0.8"/>
  <ellipse cx="215" cy="218" rx="16" ry="7" fill="#3a5818" opacity="0.8"/>
  <!-- Toes with lamellae -->
  <path d="M248 222 Q244 230 238 228 M255 223 Q252 232 246 230 M262 222 Q260 231 254 229 M268 220 Q267 229 261 228" stroke="#2a4010" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Pattern spots -->
  <circle cx="210" cy="192" r="5" fill="#3a5818" opacity="0.6"/>
  <circle cx="228" cy="186" r="5" fill="#3a5818" opacity="0.6"/>
  <circle cx="248" cy="190" r="5" fill="#3a5818" opacity="0.6"/>
  <circle cx="225" cy="202" r="4" fill="#3a5818" opacity="0.5"/>
  <!-- Label -->
  <text x="240" y="308" font-family="monospace" font-size="11" fill="#6a9a30" text-anchor="middle" letter-spacing="3" opacity="0.7">CRESTED GECKO</text>
</svg>