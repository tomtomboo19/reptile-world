<svg xmlns="http://www.w3.org/2000/svg" width="480" height="320" viewBox="0 0 480 320">
  <rect width="480" height="320" fill="#1a1a0a"/>
  <rect x="0" y="0" width="480" height="320" fill="none" stroke="#a5d6a7" stroke-width="1" opacity="0.3"/>
  <!-- Scale pattern -->
  <pattern id="scales" x="0" y="0" width="30" height="26" patternUnits="userSpaceOnUse">
    <ellipse cx="15" cy="13" rx="13" ry="10" fill="none" stroke="#a5d6a7" stroke-width="0.4" opacity="0.15"/>
  </pattern>
  <rect width="480" height="320" fill="url(#scales)"/>
  <!-- Center icon -->
  <text x="240" y="155" font-family="sans-serif" font-size="72" text-anchor="middle" dominant-baseline="middle" opacity="0.6">🐢</text>
  <!-- Species name -->
  <text x="240" y="225" font-family="monospace" font-size="13" text-anchor="middle" fill="#a5d6a7" letter-spacing="2" opacity="0.8">SULCATA TORTOISE</text>
  <!-- Decorative lines -->
  <line x1="80" y1="250" x2="200" y2="250" stroke="#a5d6a7" stroke-width="0.5" opacity="0.3"/>
  <line x1="280" y1="250" x2="400" y2="250" stroke="#a5d6a7" stroke-width="0.5" opacity="0.3"/>
</svg>